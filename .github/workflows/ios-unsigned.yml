name: Build Unsigned Expo React Native IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Install JavaScript Dependencies
        run: |
          if [ -f "yarn.lock" ]; then
            yarn install
          elif [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      # Ép máy ảo gỡ triệt để gói expo-ui lỗi thời ra khỏi hệ thống trước khi build
      - name: Force Remove Broken Expo UI Package
        run: |
          npm uninstall expo-ui @expo/ui || true
          yarn remove expo-ui @expo/ui || true

      - name: Setup Expo CLI
        run: npm install -g expo-cli

      - name: Fix Expo Dependencies Mismatch
        run: npx expo install --fix

      # MẸO MỚI: Sửa trực tiếp tệp Podfile để ép hạ nền tảng hệ điều hành xuống iOS 17.0 từ gốc
      - name: Force iOS 17.0 in Podfile
        run: |
          if [ -f "ios/Podfile" ]; then
            sed -i '' "s/platform :ios, '18.1'/platform :ios, '17.0'/g" ios/Podfile || true
            sed -i '' "s/platform :ios, '18.0'/platform :ios, '17.0'/g" ios/Podfile || true
          fi

      - name: Setup Ruby and Cocoapods Cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Cocoapods
        run: |
          cd ios
          pod install
        env:
          COCOAPODS_DISABLE_STATS: true

      - name: Build Expo iOS JS Bundle
        run: npx expo export --platform ios

      # Tự động quét cấu hình Xcode để sửa mọi biến môi trường Deployment Target còn sót lại
      - name: Modify Deployment Target in Xcode Project File
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.1;/IPHONEOS_DEPLOYMENT_TARGET = 17.0;/g' ios/*.xcodeproj/project.pbxproj || true
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/IPHONEOS_DEPLOYMENT_TARGET = 17.0;/g' ios/*.xcodeproj/project.pbxproj || true

      - name: Build Xcode Project (Unsigned)
        run: |
          cd ios
          set -o pipefail && xcodebuild -workspace *.xcworkspace \
            -scheme $(ls -d *.xcodeproj | sed 's/\.xcodeproj//') \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            IPHONEOS_DEPLOYMENT_TARGET="17.0" \
            -sdk iphoneos \
            clean build | xcbeautify --quieter

      - name: Pack Unsigned IPA
        run: |
          cd ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/
          mkdir Payload
          cp -r *.app Payload/
          zip -r expo_unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: expo-unsigned-ipa
          path: ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/expo_unsigned.ipa
