name: Build Unsigned React Native IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-14 # Sử dụng macOS 14 hỗ trợ Xcode đời cao ổn định
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sửa lỗi 1 & cập nhật lên Node 24 tương thích hệ thống mới nhất
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 

      # Sửa lỗi 2: Tự động nhận diện Yarn hoặc NPM để cài đặt, không bắt buộc file lock khắt khe
      - name: Install JavaScript Dependencies
        run: |
          if [ -f "yarn.lock" ]; then
            yarn install
          elif [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Setup Ruby and Cocoapods Cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Cocoapods
        run: |
          cd ios
          pod install
        env:
          COCOAPODS_DISABLE_STATS: true

      - name: Build React Native JS Bundle
        run: |
          mkdir -p ios/main.jsbundle
          npx react-native bundle --entry-file index.js --platform ios --dev false --bundle-output ios/main.jsbundle --assets-dest ios

      - name: Build Xcode Project (Unsigned)
        run: |
          cd ios
          xcodebuild -workspace *.xcworkspace \
            -scheme $(ls -d *.xcodeproj | sed 's/\.xcodeproj//') \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -sdk iphoneos \
            clean build

      - name: Pack Unsigned IPA
        run: |
          cd ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/
          mkdir Payload
          cp -r *.app Payload/
          zip -r react_native_unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-native-unsigned-ipa
          path: ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/react_native_unsigned.ipa
