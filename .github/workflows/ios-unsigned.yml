name: Build Unsigned Expo React Native IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-15 # Nâng cấp lên macOS 15 để hỗ trợ Xcode 16+
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ép máy ảo kích hoạt chính xác Xcode phiên bản mới để thỏa mãn React Native
      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1' # Chọn Xcode 16.1 theo yêu cầu dự án

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 

      - name: Install JavaScript Dependencies
        run: |
          if [ -f "yarn.lock" ]; then
            yarn install
          elif [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Setup Expo CLI
        run: npm install -g expo-cli

      - name: Setup Ruby and Cocoapods Cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Cocoapods
        run: |
          cd ios
          pod install
        env:
          COCOAPODS_DISABLE_STATS: true

      - name: Build Expo iOS JS Bundle
        run: npx expo export --platform ios

      - name: Build Xcode Project (Unsigned)
        run: |
          cd ios
          xcodebuild -workspace *.xcworkspace \
            -scheme $(ls -d *.xcodeproj | sed 's/\.xcodeproj//') \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -sdk iphoneos \
            -quiet \
            clean build

      - name: Pack Unsigned IPA
        run: |
          cd ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/
          mkdir Payload
          cp -r *.app Payload/
          zip -r expo_unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: expo-unsigned-ipa
          path: ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/expo_unsigned.ipa
