name: Build Unsigned React Native IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-14 # Sử dụng macOS mới để hỗ trợ Xcode đời cao
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 18 # Thay đổi phiên bản Node phù hợp với dự án của bạn
          cache: 'yarn' # Hoặc 'npm' nếu bạn dùng npm

      - name: Install JavaScript Dependencies
        run: yarn install --frozen-lockfile

      - name: Setup Ruby and Cocoapods Cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # Đảm bảo Ruby tương thích với phiên bản Pod của bạn
          bundler-cache: true

      - name: Install Cocoapods
        run: |
          cd ios
          pod install
        env:
          COCOAPODS_DISABLE_STATS: true

      # Tạo file bundle JavaScript chứa toàn bộ code logic của React Native
      - name: Build React Native JS Bundle
        run: |
          mkdir -p ios/main.jsbundle
          npx react-native bundle --entry-file index.js --platform ios --dev false --bundle-output ios/main.jsbundle --assets-dest ios

      # Lệnh quan trọng nhất: Dùng Xcode build không cần tài khoản, không cần ký số
      - name: Build Xcode Project (Unsigned)
        run: |
          cd ios
          xcodebuild -workspace *.xcworkspace \
            -scheme $(ls -d *.xcodeproj | sed 's/\.xcodeproj//') \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -sdk iphoneos \
            clean build

      # Gom file .app vừa build xong vào thư mục Payload để đóng gói thành .ipa chuẩn
      - name: Pack Unsigned IPA
        run: |
          cd ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/
          mkdir Payload
          cp -r *.app Payload/
          zip -r react_native_unsigned.ipa Payload

      # Đẩy file .ipa thành phẩm lên mục Artifacts để tải về máy tính Windows/Linux
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-native-unsigned-ipa
          path: ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/react_native_unsigned.ipa
